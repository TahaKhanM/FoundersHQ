name: backend

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: foundershq
          POSTGRES_PASSWORD: foundershq
          POSTGRES_DB: foundershq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://foundershq:foundershq@localhost:5432/foundershq_test
      DATABASE_URL_SYNC: postgresql://foundershq:foundershq@localhost:5432/foundershq_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      SECRET_KEY: ci-secret
      OPENAI_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: |
          pip install -e ".[dev]"

      - name: Migrate
        run: alembic upgrade head

      - name: Lint
        run: ruff check .

      - name: Typecheck
        run: mypy app

      - name: Test
        run: pytest -x --tb=short
